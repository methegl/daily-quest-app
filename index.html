<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>日常クエスト</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="status-card">
            <div class="status-left">
                <h3>ギネス</h3>
                <p id="levelText">Lv1</p>
                <p id="guinnessForm">くろいぶよぶよ</p>
                <p id="expText">EXP 0 / 100</p>
            </div>

            <div class="status-right">
                <div class="guinness"></div>
            </div>
        </div>

        <div id="mode-switch">
            <button id="workModeBtn">仕事</button>
            <button id="restModeBtn">休み</button>
            <button id="earlySleepBtn">早寝</button>
        </div>

        <div id="quests">
            <p id="todayDate"></p>
            <h2>今日のクエスト</h2>
            <p id="progress">進行度 0 / 0 </p>
            <p id="completeMessage"></p>

            <label class="quest-item quest-base">
                <input type="checkbox" id="report_start">
                🦣開始報告
            </label>

            <label class="quest-item quest-base">
                <input type="checkbox" id="sidejob_25">
                📝副業25分
            </label>

            <label class="quest-item quest-base">
                <input type="checkbox" id="report_end">
                🦣終了報告
            </label>

            <label class="quest-item quest-work">
                <input type="checkbox" id="work_start">
                💼出勤
            </label>

            <label class="quest-item quest-work">
                <input type="checkbox" id="work_end">
                🟩退勤連絡
            </label>

            <label class="quest-item quest-rest">
                <input type="checkbox" id="laundry_start">
                🫧洗濯する
            </label>

            <label class="quest-item quest-rest">
                <input type="checkbox" id="laundry_end">
                🧺洗濯物干す
            </label>

            <label class="quest-item quest-sleep-normal">
                <input type="checkbox" id="bed_normal">
                🛏2時までに布団
            </label>

            <label class="quest-item quest-sleep-early">
                <input type="checkbox" id="bed_early">
                🛏同じ時間に布団
            </label>

        </div>

        <div id="workLogSection">
            <h2>今日の作業</h2>

            <div class="worcItem">
                <span>領収書</span>
                <button class="logButton" data-task="領収書" data-action="開始">[開始]</button>
                <button class="logButton" data-task="領収書" data-action="完了">[完了]</button>
            </div>

            <br>
            
            <div class="worcItem">
                <span>絵の仕事</span>
                <button class="logButton" data-task="絵の仕事" data-action="開始">[開始]</button>
                <button class="logButton" data-task="絵の仕事" data-action="完了">[完了]</button>
            </div>

            <br>

            <div class="worcItem">
                <span>Web開発</span>
                <button class="logButton" data-task="絵の仕事" data-action="Web開発">[開始]</button>
                <button class="logButton" data-task="絵の仕事" data-action="Web開発">[完了]</button>
            </div>

            <br>

            <h3>自由ログ</h3>
            <input type="text" id="freeLogInput">
            <button id="addFreeLog">[追加]</button>

            <h3>今日のログ</h3>
            <ul id="todayLogList"></ul>
        </div>

        <br>

        <script src="app.js"></script>

    </body>
</html>
